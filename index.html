<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#0f121e">
  <meta name="description" content="A full offline virtual-pet life simulator and music player.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>Pico Tamachibi</title>
</head>
<body>
<div id="app" class="app-shell">
  <header class="topbar">
    <div>
      <div class="eyebrow" id="activityLabel">HOME</div>
      <h1><span id="petName">Mochi</span> <span class="stage-chip" id="stageChip">BABY</span></h1>
    </div>
    <div class="top-actions">
      <button id="notifyBtn" class="icon-btn" aria-label="Enable notifications">🔔</button>
      <button id="installBtn" class="icon-btn hidden" aria-label="Install app">⬇</button>
      <time id="clock">--:--</time>
    </div>
  </header>

  <section id="statusStrip" class="status-strip" aria-label="Current needs"></section>

  <nav class="view-switch" aria-label="World view">
    <button data-view="tama" class="active">Tamagotchi</button>
    <button data-view="home">Home</button>
    <button data-view="city">City</button>
  </nav>

  <main class="game-card">
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="128" height="64" aria-label="Tamagotchi game scene"></canvas>
      <div id="sceneBadge" class="scene-badge"></div>
    </div>
    <div class="scene-controls">
      <button id="prevScene" aria-label="Previous room or place">◀</button>
      <div>
        <strong id="sceneTitle">Pet Room</strong>
        <small id="sceneSubtitle">Together at home</small>
      </div>
      <button id="nextScene" aria-label="Next room or place">▶</button>
    </div>
  </main>

  <section id="quickActions" class="quick-actions" aria-label="Actions"></section>

  <nav class="bottom-nav" aria-label="Main sections">
    <button data-panel="care"><span>🍽</span>Care</button>
    <button data-panel="play"><span>🎮</span>Play</button>
    <button data-panel="talk"><span>💬</span>Talk</button>
    <button data-panel="world"><span>🏡</span>World</button>
    <button data-panel="music"><span>💿</span>Music</button>
    <button data-panel="more"><span>⋯</span>More</button>
  </nav>
</div>

<div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-sheet">
    <div class="modal-head">
      <div><div class="eyebrow" id="modalEyebrow"></div><h2 id="modalTitle"></h2></div>
      <button id="modalClose" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<div id="dialogue" class="dialogue hidden" role="dialog" aria-modal="true">
  <div class="dialogue-card">
    <div class="dialogue-avatar"><canvas id="dialogueCanvas" width="48" height="48"></canvas></div>
    <div class="dialogue-content">
      <div class="eyebrow" id="dialogueType">TALK</div>
      <h2 id="dialogueTitle"></h2>
      <div id="dialogueText" class="dialogue-text"></div>
      <div id="dialogueChoices" class="dialogue-choices"></div>
      <button id="dialogueContinue" class="primary hidden">Continue</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden" role="status"></div>
<audio id="audio" preload="metadata"></audio>
<input id="musicFiles" type="file" accept="audio/mpeg,.mp3" multiple hidden>
<input id="musicFolder" type="file" accept="audio/mpeg,.mp3" webkitdirectory multiple hidden>
<input id="importSave" type="file" accept="application/json,.json" hidden>
<script type="module" src="app.js"></script>
</body>
</html>
